name: CI-Pipeline-Esaip

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v4
        with:
          context: ./app-backend
          push: true
          tags: nsoumbe/app-backend:latest 

      - name: Build and Push Frontend
        uses: docker/build-push-action@v4
        with:
          context: ./app-frontend
          push: true
          tags: nsoumbe/app-frontend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push # Attend que le build soit fini avant de déployer
    steps:
      - name: Déploiement via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 2222
          script: |
            cd /home/master/projet-devsecops-esaip
            git pull origin main
            
            # On applique les fichiers (dans le namespace default puisque c'est là qu'ils sont)
            kubectl apply -f backend.yaml -n default
            kubectl apply -f frontend.yaml -n default
            
            # On relance les services avec les noms validés
            kubectl rollout restart deployment/backend -n default
            kubectl rollout restart deployment/frontend -n default
